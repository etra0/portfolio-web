<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wildlife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/css/glide.core.min.css">
  <link href="https://fonts.googleapis.com/css?family=Merriweather:400,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700&display=swap" rel="stylesheet">
</head>
<body>
  <h1 class="mobile-header"><a href="/">Sebastián Aedo</a></h1>
  <div class="sidebar">
    <h1><a class="sidebar-title" href="/">Sebastián Aedo</a></h1>
    <ul>
      
        <li><a href="/categories/black-and-white/">Black and White</a></li>
      
        <li><a href="/categories/color/">Color</a></li>
      
        <li><a href="/categories/film/">Film</a></li>
      
        <li><a href="/categories/wildlife/">Wildlife</a></li>
      
    </ul>
    <div class="sidebar-bottom">
      <a href="/about/">About</a>
    </div>
  </div>
  <div id="sidebar-overlay"></div>
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Show navigation">&#9776;</button>
  <main>
    
<h2>Wildlife</h2>

<div class="gallery-grid">
  
    <img src="https://pics.etra0.cl/wildlife/P1001126.jpg" alt="Colibrí Chico" loading="lazy" width="1350" height="1080" onclick="expandImage('https:\/\/pics.etra0.cl\/wildlife\/P1001126.jpg', 'Colibrí Chico',  0 )">
  
    <img src="https://pics.etra0.cl/wildlife/P1001402-4.jpg" alt="Siete Colores" loading="lazy" width="2048" height="1638" onclick="expandImage('https:\/\/pics.etra0.cl\/wildlife\/P1001402-4.jpg', 'Siete Colores',  1 )">
  
    <img src="https://pics.etra0.cl/wildlife/P1000562.jpg" alt="" loading="lazy" width="1440" height="1080" onclick="expandImage('https:\/\/pics.etra0.cl\/wildlife\/P1000562.jpg', '',  2 )">
  
    <img src="https://pics.etra0.cl/wildlife/P1000572-Enhanced-NR.jpg" alt="" loading="lazy" width="1440" height="1080" onclick="expandImage('https:\/\/pics.etra0.cl\/wildlife\/P1000572-Enhanced-NR.jpg', '',  3 )">
  
    <img src="https://pics.etra0.cl/wildlife/_DSC7936-6.jpg" alt="Nara" loading="lazy" width="2048" height="1638" onclick="expandImage('https:\/\/pics.etra0.cl\/wildlife\/_DSC7936-6.jpg', 'Nara',  4 )">
  
    <img src="https://pics.etra0.cl/wildlife/P1000587.jpg" alt="" loading="lazy" width="1080" height="1440" onclick="expandImage('https:\/\/pics.etra0.cl\/wildlife\/P1000587.jpg', '',  5 )">
  
</div>
<div id="expanded-view" class="expanded-view">
  <button class="arrow left" onclick="prevImage(event)">&#8592;</button>
  <div class="expanded-img-container">
    <img id="expanded-img" src="" alt="">
    <p id="expanded-caption"></p>
  </div>
  <button class="arrow right" onclick="nextImage(event)">&#8594;</button>
  <button class="close-btn" onclick="closeExpanded()">×</button>
</div>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/glide.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      
      document.querySelectorAll(".glide").forEach(function (carousel) {
        new Glide(carousel, { type: 'carousel', perView: 1, focusAt: 'center' }).mount();
      });

      
      const container = document.querySelector('.gallery-grid');
      if (container) {
        const gap = 8;
        const targetRowHeight = 600; 
        const images = Array.from(container.querySelectorAll('img'));

        function layout() {
          container.innerHTML = '';
          let row = [];
          let rowAspectSum = 0;
          const containerWidth = container.clientWidth;

          images.forEach((img, i) => {
            const w = parseFloat(img.getAttribute('width')) || img.naturalWidth || 1;
            const h = parseFloat(img.getAttribute('height')) || img.naturalHeight || 1;
            const aspect = w / h;
            row.push(img);
            rowAspectSum += aspect;

            const rowWidth = rowAspectSum * targetRowHeight + gap * (row.length - 1);

            if (rowWidth >= containerWidth || i === images.length - 1) {
              const totalGap = gap * (row.length - 1);
              const rowHeight = Math.min(targetRowHeight, (containerWidth - totalGap) / rowAspectSum);

              const rowDiv = document.createElement('div');
              rowDiv.className = 'gallery-row';

              row.forEach(imgInRow => {
                const w2 = parseFloat(imgInRow.getAttribute('width')) || imgInRow.naturalWidth || 1;
                const h2 = parseFloat(imgInRow.getAttribute('height')) || imgInRow.naturalHeight || 1;
                const aspect2 = w2 / h2;
                const imgClone = imgInRow.cloneNode();
                
                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper';
                wrapper.style.height = rowHeight + 'px';
                wrapper.style.width = (rowHeight * aspect2) + 'px';
                
                if (imgClone.complete) {
                  imgClone.classList.add('is-loaded');
                } else {
                  imgClone.onload = () => imgClone.classList.add('is-loaded');
                }
                
                wrapper.appendChild(imgClone);
                rowDiv.appendChild(wrapper);
              });

              container.appendChild(rowDiv);
              row = [];
              rowAspectSum = 0;
            }
          });
          container.classList.add('loaded');
          updateGalleryImages(); 
        }

        let allHaveDimensions = true;
        images.forEach(img => {
          if (!img.getAttribute('width') || !img.getAttribute('height')) {
            allHaveDimensions = false;
          }
        });

        if (allHaveDimensions) {
          layout();
        } else {
          let loaded = 0;
          images.forEach(img => {
            if (img.complete) loaded++;
            else img.addEventListener('load', () => {
              loaded++;
              if (loaded === images.length) layout();
            });
          });
          if (loaded === images.length) layout();
        }

        let lastWidth = window.innerWidth;
        window.addEventListener('resize', () => {
          if (window.innerWidth !== lastWidth) {
            lastWidth = window.innerWidth;
            layout();
          }
        });

        
        function updateGalleryImages() {
          galleryImages = Array.from(container.querySelectorAll('img'));
          galleryImages.forEach((img, idx) => {
            img.setAttribute('data-caption', img.getAttribute('alt') || '');
            img.onclick = function() { expandImage(img.src, img.getAttribute('alt') || '', idx); };
          });
        }
      }

      
      const sidebar = document.querySelector('.sidebar');
      const toggleBtn = document.getElementById('sidebar-toggle');
      const overlay = document.getElementById('sidebar-overlay');
      if (toggleBtn && sidebar && overlay) {
        toggleBtn.addEventListener('click', function() {
          sidebar.classList.add('open');
          overlay.classList.add('active');
        });
        overlay.addEventListener('click', function() {
          sidebar.classList.remove('open');
          overlay.classList.remove('active');
        });
      }
    });

    let currentIndex = 0;
let galleryImages = [];

function expandImage(url, caption, index) {
  const expandedView = document.getElementById('expanded-view');
  document.getElementById('expanded-img').src = url;
  document.getElementById('expanded-caption').textContent = caption;
  expandedView.classList.add('active');
  currentIndex = index;
}

function closeExpanded() {
  document.getElementById('expanded-view').classList.remove('active');
  document.getElementById('expanded-img').src = '';
  document.getElementById('expanded-caption').textContent = '';
}

function prevImage(e) {
  e.stopPropagation();
  if (galleryImages.length === 0) return;
  currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
  showCurrentImage();
}

function nextImage(e) {
  e.stopPropagation();
  if (galleryImages.length === 0) return;
  currentIndex = (currentIndex + 1) % galleryImages.length;
  showCurrentImage();
}

function showCurrentImage() {
  const img = galleryImages[currentIndex];
  expandImage(img.src, img.getAttribute('data-caption'), currentIndex);
}

document.addEventListener("keydown", function(e) {
  const expandedView = document.getElementById('expanded-view');
  if (!expandedView || !expandedView.classList.contains('active')) return;

  if (e.key === "ArrowLeft") {
    prevImage(e);
  } else if (e.key === "ArrowRight") {
    nextImage(e);
  } else if (e.key === "Escape") {
    closeExpanded();
  }
});
</script>
</body>
</html>
